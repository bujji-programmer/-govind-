<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Always Listening Voice UI</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600;800&display=swap" rel="stylesheet">

<style>
  body {
    margin: 0;
    height: 100vh;
    background: radial-gradient(circle at center, #050816, #000);
    font-family: 'Orbitron', sans-serif;
    display: flex;
    justify-content: center;
    align-items: center;
    overflow: hidden;
    color: white;
  }

  /* 🌌 Universe */
  body::before {
    content: "";
    position: absolute;
    width: 200%;
    height: 200%;
    background-image: radial-gradient(white 1px, transparent 1px);
    background-size: 3px 3px;
    opacity: 0.2;
    animation: move 60s linear infinite;
  }

  @keyframes move {
    from { transform: translate(0,0); }
    to { transform: translate(-10%, -10%); }
  }

  #text {
    font-size: clamp(30px, 8vw, 100px);
    text-align: center;
    font-weight: 800;
    background: linear-gradient(90deg, #00f5ff, #ff00ff, #00ff88);
    -webkit-background-clip: text;
    color: transparent;
    text-shadow: 0 0 20px rgba(0,255,255,0.4);
    padding: 20px;
  }

  #status {
    position: absolute;
    bottom: 90px;
    font-size: 14px;
    opacity: 0.7;
  }

  button {
    position: absolute;
    bottom: 30px;
    padding: 14px 25px;
    border: none;
    border-radius: 40px;
    background: linear-gradient(90deg, #00f5ff, #ff00ff);
    color: white;
    cursor: pointer;
  }
</style>
</head>

<body>

<div id="text">SPEAK ANYTHING</div>
<div id="status">Idle</div>
<button onclick="startListening()">Start Voice</button>

<script>
const text = document.getElementById("text");
const status = document.getElementById("status");

const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;

let recognition;

if (SpeechRecognition) {

  recognition = new SpeechRecognition();

  recognition.lang = "en-US";
  recognition.continuous = true;   // 🔥 KEY FIX
  recognition.interimResults = true;

  recognition.onstart = () => {
    status.innerText = "🎤 Listening continuously...";
  };

  recognition.onresult = (event) => {
    let finalText = "";

    for (let i = event.resultIndex; i < event.results.length; i++) {
      finalText += event.results[i][0].transcript;
    }

    text.innerText = finalText.toUpperCase();
  };

  // 🔁 AUTO RESTART (MOST IMPORTANT FIX)
  recognition.onend = () => {
    recognition.start();
  };

  recognition.onerror = (e) => {
    status.innerText = "Error: " + e.error;
  };

} else {
  alert("Speech recognition not supported. Use Chrome.");
}

function startListening() {
  recognition.start();
}
</script>

</body>
</html>
